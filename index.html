<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환영합니다</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <nav class="navigation">
            <span class="logo">바이브코딩</span>
            <ul class="menu-list">
                <li><a href="#home">홈</a></li>
                <li><a href="#about">소개</a></li>
                <li><a href="#contact">연락</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero-section">
            <h1 class="hero-title">안녕하세요!</h1>
            <p class="hero-description">간단하고 아름다운 웹사이트에 오신 것을 환영합니다.</p>
            <button class="cta-button" id="greetingButton">인사하기</button>
            <p class="greeting-message" id="greetingMessage"></p>
        </section>

        <section id="about" class="about-section">
            <h2>소개</h2>
            <p>이 웹사이트는 HTML, CSS, JavaScript로 만들어졌습니다. 버튼을 눌러보세요!</p>
        </section>

        <section id="contact" class="contact-section">
            <h2>연락처</h2>
            <p>궁금한 점이 있으시면 언제든 연락해 주세요.</p>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2025 바이브코딩. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
